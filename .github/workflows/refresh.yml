name: refresh-snapshot

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 min (crypto trades 24/7)
  workflow_dispatch: {}        # allow manual run from the Actions tab

permissions:
  contents: write

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Fetch snapshot
        run: python scripts/refresh.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain docs/data/snapshot.json)" ]; then
            git add docs/data/snapshot.json
            git commit -m "data: refresh snapshot ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          else
            echo "No change in snapshot."
          fi
